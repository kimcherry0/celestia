      <h2 class="page-title">교통 안내</h2>

      <h3>무인 경로 기반 공중 교통 시스템</h3>
      <p>셀레스티아와 르셰연방 주요 구역의 교통은 무인 자동 경로 시스템을 기반으로 운영됩니다.<br>
      공중철도, 자동 비행차량, 대중 교통 캡슐은 사전 입력된 안전 경로를 따라 이동하며, 모든 노선은 중앙 교통망과 실시간으로 연동됩니다.</p>

      <p>개인 차량 소유는 가능하나, 수동 운전 자격은 별도 심사를 통과한 소수 인원에게만 부여됩니다.<br>
      이는 공중 교통 밀집 구역의 사고를 예방하고, 심층 경보 발생 시 신속한 통제와 대피를 가능하게 하기 위한 조치입니다.</p>
